<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - InkSpire</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-pen-fill"></i>InkSpire</a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <a href="cart.html" class="nav-link nav-cart-btn position-relative">
                        <i class="bi bi-cart3 fs-5"></i>
                        <span class="cart-count-badge" id="cart-count-badge" style="display:none;">0</span>
                    </a>
                    <div id="nav-auth-section"></div>
                </div>
            </div>
        </div>
    </nav>

    <main>
        <div class="page-header">
            <div class="container">
                <h1>Shopping Cart</h1>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                        <li class="breadcrumb-item active">Cart</li>
                    </ol>
                </nav>
            </div>
        </div>

        <div class="container pb-5 cart-page-container">
            <div class="row g-4" id="cart-content">
                <!-- Filled dynamically by JS -->
                <div class="col-12 text-center py-5">
                    <div class="spinner-border spinner-border-custom" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-bottom text-center">
                <p>&copy; 2024 InkSpire. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <button id="back-to-top"><i class="bi bi-chevron-up"></i></button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/app.js"></script>
    <script>
        class CartPage {
            constructor() {
                this.init();
            }

            async init() {
                await authService.onAuthReady();
                await cartService.loadCart();
                this.render();
            }

            render() {
                const container = document.getElementById('cart-content');
                if (cartService.items.length === 0) {
                    container.innerHTML = `
                        <div class="col-12">
                            <div class="empty-cart">
                                <div class="empty-cart-icon"><i class="bi bi-cart-x"></i></div>
                                <h3>Your Cart is Empty</h3>
                                <p>Looks like you haven't added any items yet. Start exploring our collection!</p>
                                <a href="products.html" class="btn btn-primary btn-lg">
                                    <i class="bi bi-bag-heart me-1"></i>Browse Products
                                </a>
                            </div>
                        </div>`;
                    return;
                }

                const subtotal = cartService.getSubtotal();
                const tax = cartService.getTax();
                const shipping = cartService.getShipping();
                const total = cartService.getTotal();
                const isFreeShipping = subtotal >= cartService.FREE_SHIPPING_THRESHOLD;
                const amountToFreeShipping = (cartService.FREE_SHIPPING_THRESHOLD - subtotal).toFixed(2);

                container.innerHTML = `
                    <div class="col-lg-8">
                        <div class="card border-0 shadow-sm rounded-custom">
                            <div class="card-header bg-white d-flex justify-content-between align-items-center py-3 px-4 border-0">
                                <h5 class="mb-0 fw-bold">${cartService.getItemCount()} Item${cartService.getItemCount() !== 1 ? 's' : ''} in Cart</h5>
                                <button class="btn btn-outline-danger btn-sm" onclick="cartPage.clearCart()">
                                    <i class="bi bi-trash me-1"></i>Clear All
                                </button>
                            </div>
                            <div class="card-body p-0">
                                ${cartService.items.map(item => this.renderCartItem(item)).join('')}
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-4">
                        <div class="cart-summary">
                            <div class="cart-summary-card">
                                <h5><i class="bi bi-receipt me-2"></i>Order Summary</h5>
                                
                                ${!isFreeShipping ? `
                                <div class="alert alert-info py-2 px-3 mb-3" style="font-size:0.8rem;">
                                    <i class="bi bi-truck me-1"></i>
                                    Add <strong>$${amountToFreeShipping}</strong> more for free shipping!
                                </div>` : `
                                <div class="mb-3">
                                    <span class="free-shipping-badge"><i class="bi bi-check-circle-fill"></i>Free Shipping Applied!</span>
                                </div>`}

                                <div class="summary-row">
                                    <span>Subtotal</span>
                                    <span class="fw-semibold">$${subtotal.toFixed(2)}</span>
                                </div>
                                <div class="summary-row">
                                    <span>Tax (8%)</span>
                                    <span class="fw-semibold">$${tax.toFixed(2)}</span>
                                </div>
                                <div class="summary-row">
                                    <span>Shipping</span>
                                    <span class="fw-semibold ${isFreeShipping ? 'text-success' : ''}">${isFreeShipping ? 'FREE' : '$' + shipping.toFixed(2)}</span>
                                </div>
                                <div class="summary-row total">
                                    <span>Total</span>
                                    <span class="text-primary">$${total.toFixed(2)}</span>
                                </div>

                                <button class="btn btn-primary w-100 btn-lg mt-4" onclick="cartPage.proceedToCheckout()">
                                    <i class="bi bi-lock-fill me-1"></i>Proceed to Checkout
                                </button>
                                <a href="products.html" class="btn btn-outline-primary w-100 mt-2">
                                    <i class="bi bi-arrow-left me-1"></i>Continue Shopping
                                </a>
                            </div>
                        </div>
                    </div>`;
            }

            renderCartItem(item) {
                const itemTotal = (item.price * item.quantity).toFixed(2);
                return `
                <div class="cart-item" id="cart-item-${item.productId}">
                    <div class="row align-items-center g-3">
                        <div class="col-auto">
                            <img src="${item.imageURL}" alt="${item.title}" class="cart-item-image">
                        </div>
                        <div class="col">
                            <div class="cart-item-category">${(item.category || '').replace('-', ' ')}</div>
                            <div class="cart-item-title">${item.title}</div>
                            <div class="cart-item-price d-md-none">$${item.price.toFixed(2)}</div>
                        </div>
                        <div class="col-auto d-none d-md-block">
                            <span class="fw-semibold">$${item.price.toFixed(2)}</span>
                        </div>
                        <div class="col-auto">
                            <div class="quantity-control">
                                <button onclick="cartPage.updateQty('${item.productId}', ${item.quantity - 1})">
                                    <i class="bi bi-dash"></i>
                                </button>
                                <div class="quantity-value">${item.quantity}</div>
                                <button onclick="cartPage.updateQty('${item.productId}', ${item.quantity + 1})">
                                    <i class="bi bi-plus"></i>
                                </button>
                            </div>
                        </div>
                        <div class="col-auto d-none d-md-block">
                            <span class="fw-bold text-primary">$${itemTotal}</span>
                        </div>
                        <div class="col-auto">
                            <button class="btn btn-outline-danger btn-icon btn-sm" onclick="cartPage.removeItem('${item.productId}')">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>`;
            }

            async updateQty(productId, quantity) {
                await cartService.updateQuantity(productId, quantity);
                this.render();
            }

            async removeItem(productId) {
                await cartService.removeItem(productId);
                this.render();
            }

            async clearCart() {
                if (confirm('Are you sure you want to clear your entire cart?')) {
                    await cartService.clearAllItems();
                    toast.info('Cart has been cleared.');
                    this.render();
                }
            }

            proceedToCheckout() {
                if (!authService.isLoggedIn()) {
                    toast.warning('Please login to proceed to checkout.');
                    setTimeout(() => {
                        window.location.href = 'login.html?redirect=' + encodeURIComponent('checkout.html');
                    }, 1000);
                    return;
                }
                window.location.href = 'checkout.html';
            }
        }

        const cartPage = new CartPage();
    </script>
</body>
</html>
