<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - InkSpire</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-pen-fill"></i>InkSpire</a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <a href="cart.html" class="nav-link nav-cart-btn position-relative">
                        <i class="bi bi-cart3 fs-5"></i>
                        <span class="cart-count-badge" id="cart-count-badge" style="display:none;">0</span>
                    </a>
                    <div id="nav-auth-section"></div>
                </div>
            </div>
        </div>
    </nav>

    <main>
        <!-- Dashboard Header -->
        <div class="dashboard-header" id="dashboard-header">
            <div class="container">
                <div class="d-flex align-items-center gap-3">
                    <div class="dashboard-avatar"><i class="bi bi-person-fill"></i></div>
                    <div>
                        <h3 class="mb-1 text-white fw-bold" id="dash-user-name">Loading...</h3>
                        <p class="mb-0 opacity-75" id="dash-user-email">...</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="container py-4" id="dashboard-content">
            <div class="text-center py-5">
                <div class="spinner-border spinner-border-custom" role="status"></div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container"><div class="footer-bottom text-center"><p>&copy; 2024 InkSpire.</p></div></div>
    </footer>
    <button id="back-to-top"><i class="bi bi-chevron-up"></i></button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/app.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
