<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - InkSpire</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Sidebar -->
    <aside class="admin-sidebar" id="admin-sidebar">
        <div class="sidebar-brand"><i class="bi bi-pen-fill"></i>InkSpire Admin</div>
        <div class="sidebar-section-title">Main</div>
        <ul class="sidebar-nav">
            <li class="nav-item">
                <a class="nav-link active" href="#" data-section="dashboard" onclick="adminPage.showSection('dashboard',this)">
                    <i class="bi bi-speedometer2"></i>Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" data-section="products" onclick="adminPage.showSection('products',this)">
                    <i class="bi bi-box-seam"></i>Products
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" data-section="orders" onclick="adminPage.showSection('orders',this)">
                    <i class="bi bi-receipt"></i>Orders
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" data-section="users" onclick="adminPage.showSection('users',this)">
                    <i class="bi bi-people"></i>Users
                </a>
            </li>
        </ul>
        <div class="sidebar-section-title">Actions</div>
        <ul class="sidebar-nav">
            <li class="nav-item">
                <a class="nav-link" href="index.html"><i class="bi bi-house"></i>View Store</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" onclick="authService.logout();return false;">
                    <i class="bi bi-box-arrow-right"></i>Logout
                </a>
            </li>
        </ul>
    </aside>

    <!-- Sidebar Overlay (Mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="adminPage.toggleSidebar()"></div>

    <!-- Main Content -->
    <div class="admin-main">
        <!-- Topbar -->
        <div class="admin-topbar">
            <div class="d-flex align-items-center gap-3">
                <button class="sidebar-toggle-btn" onclick="adminPage.toggleSidebar()">
                    <i class="bi bi-list"></i>
                </button>
                <h5 class="mb-0 fw-bold" id="admin-page-title">Dashboard</h5>
            </div>
            <div class="d-flex align-items-center gap-3">
                <span class="text-muted small" id="admin-user-name">Admin</span>
                <div class="user-avatar-sm"><i class="bi bi-person-circle fs-5"></i></div>
            </div>
        </div>

        <!-- Content Area -->
        <div class="admin-content" id="admin-content">
            <div class="text-center py-5">
                <div class="spinner-border spinner-border-custom" role="status"></div>
                <p class="text-muted mt-2">Checking admin access...</p>
            </div>
        </div>
    </div>

    <!-- Add/Edit Product Modal -->
    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="productModalTitle">Add New Product</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="product-form">
                        <input type="hidden" id="product-edit-id">
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label class="form-label">Product Title *</label>
                                <input type="text" class="form-control" id="pf-title" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Category *</label>
                                <select class="form-select" id="pf-category" required>
                                    <option value="">Select...</option>
                                    <option value="notebooks">Notebooks</option>
                                    <option value="pens">Pens</option>
                                    <option value="pencils">Pencils</option>
                                    <option value="art-supplies">Art Supplies</option>
                                    <option value="paper">Paper</option>
                                    <option value="organizers">Organizers</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Description</label>
                                <textarea class="form-control" id="pf-description" rows="3"></textarea>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Price ($) *</label>
                                <input type="number" class="form-control" id="pf-price" step="0.01" min="0" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Original Price ($)</label>
                                <input type="number" class="form-control" id="pf-original-price" step="0.01" min="0">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Stock *</label>
                                <input type="number" class="form-control" id="pf-stock" min="0" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Brand</label>
                                <input type="text" class="form-control" id="pf-brand">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Image URL</label>
                                <input type="url" class="form-control" id="pf-image" placeholder="https://...">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Or Upload Image From Device</label>
                                <input type="file" class="form-control" id="pf-image-file" accept="image/*" onchange="adminPage.handleImageFileChange(event)">
                                <div class="form-text">JPG, PNG, WEBP up to 2MB.</div>
                                <div class="mt-2 d-none" id="pf-image-preview-wrap">
                                    <img id="pf-image-preview" src="" alt="Selected product image preview" style="width: 90px; height: 90px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd;">
                                    <button type="button" class="btn btn-sm btn-outline-secondary ms-2" onclick="adminPage.clearSelectedImage()">
                                        Remove selected file
                                    </button>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Rating</label>
                                <input type="number" class="form-control" id="pf-rating" min="0" max="5" step="0.1" value="4.0">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Reviews Count</label>
                                <input type="number" class="form-control" id="pf-reviews" min="0" value="0">
                            </div>
                            <div class="col-md-3">
                                <div class="form-check mt-4">
                                    <input class="form-check-input" type="checkbox" id="pf-featured">
                                    <label class="form-check-label" for="pf-featured">Featured</label>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="form-check mt-4">
                                    <input class="form-check-input" type="checkbox" id="pf-trending">
                                    <label class="form-check-label" for="pf-trending">Trending</label>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="save-product-btn" onclick="adminPage.saveProduct()">
                        <i class="bi bi-check-circle me-1"></i>Save Product
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/app.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
