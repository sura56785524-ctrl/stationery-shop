<!DOCTYPE html>
<html lang="en">
<head>
    <script>(function(){const t=localStorage.getItem("inkspire_theme")||(window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");document.documentElement.setAttribute("data-theme",t);})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - SmartStationery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Sidebar -->
    <aside class="admin-sidebar" id="admin-sidebar">
        <div class="sidebar-brand"><i class="bi bi-pen-fill"></i><span data-i18n="nav_brand">SmartStationery</span> Admin</div>
        <div class="sidebar-section-title" data-i18n="admin_main">Main</div>
        <ul class="sidebar-nav">
            <li class="nav-item">
                <a class="nav-link active" href="#" data-section="dashboard" onclick="adminPage.showSection('dashboard',this)">
                    <i class="bi bi-speedometer2"></i><span data-i18n="admin_dashboard">Dashboard</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" data-section="products" onclick="adminPage.showSection('products',this)">
                    <i class="bi bi-box-seam"></i><span data-i18n="admin_products">Products</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" data-section="orders" onclick="adminPage.showSection('orders',this)">
                    <i class="bi bi-receipt"></i><span data-i18n="admin_orders">Orders</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" data-section="users" onclick="adminPage.showSection('users',this)">
                    <i class="bi bi-people"></i><span data-i18n="admin_users">Users</span>
                </a>
            </li>
        </ul>
        <div class="sidebar-section-title" data-i18n="admin_actions">Actions</div>
        <ul class="sidebar-nav">
            <li class="nav-item">
                <a class="nav-link" href="index.html"><i class="bi bi-house"></i><span data-i18n="admin_view_store">View Store</span></a>
            </li>
            <!-- Enhanced Language Selector (Admin) -->
            <li class="nav-item dropdown language-switcher mx-3 my-2">
                <button class="nav-link dropdown-toggle btn btn-sm border-0" type="button" id="adminLanguageDropdown" data-bs-toggle="dropdown">
                    <i class="bi bi-globe2"></i>
                    <span id="currentLang">EN</span>
                </button>
                <ul class="dropdown-menu" aria-labelledby="adminLanguageDropdown">
                    <li><a class="dropdown-item" href="#" onclick="window.i18n.setLanguage('en')">
                        <i class="bi bi-flag"></i> English
                    </a></li>
                    <li><a class="dropdown-item" href="#" onclick="window.i18n.setLanguage('am')">
                        <i class="bi bi-flag"></i> አማርኛ
                    </a></li>
                </ul>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#" onclick="authService.logout();return false;">
                    <i class="bi bi-box-arrow-right"></i><span data-i18n="nav_logout">Logout</span>
                </a>
            </li>
        </ul>
    </aside>

    <!-- Sidebar Overlay (Mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="adminPage.toggleSidebar()"></div>

    <!-- Main Content -->
    <div class="admin-main">
        <!-- Topbar -->
        <div class="admin-topbar">
            <div class="d-flex align-items-center gap-3">
                <button class="sidebar-toggle-btn" onclick="adminPage.toggleSidebar()">
                    <i class="bi bi-list"></i>
                </button>
                <h5 class="mb-0 fw-bold" id="admin-page-title" data-i18n="admin_dashboard">Dashboard</h5>
            </div>
            <div class="d-flex align-items-center gap-3">
                <span class="text-muted small" id="admin-user-name">Admin</span>
                <div class="user-avatar-sm"><i class="bi bi-person-circle fs-5"></i></div>
            </div>
        </div>

        <!-- Content Area -->
        <div class="admin-content" id="admin-content">
            <div class="text-center py-5">
                <div class="spinner-border spinner-border-custom" role="status"></div>
                <p class="text-muted mt-2" data-i18n="loading">Checking admin access...</p>
            </div>
        </div>
    </div>

    <!-- Add/Edit Product Modal -->
    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="productModalTitle" data-i18n="admin_add_product">Add New Product</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="product-form">
                        <input type="hidden" id="product-edit-id">
                        <div class="row g-3">
                            <div class="col-md-8">
                                <label class="form-label" data-i18n="admin_product_name">Product Title *</label>
                                <input type="text" class="form-control" id="pf-title" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label" data-i18n="product_category">Category *</label>
                                <select class="form-select" id="pf-category" required>
                                    <option value="" data-i18n="select_language">Select...</option>
                                    <option value="notebooks" data-i18n="products_notebooks">Notebooks</option>
                                    <option value="pens" data-i18n="products_pens">Pens</option>
                                    <option value="pencils" data-i18n="products_pencils">Pencils</option>
                                    <option value="art-supplies" data-i18n="products_art_supplies">Art Supplies</option>
                                    <option value="paper" data-i18n="products_paper">Paper</option>
                                    <option value="organizers" data-i18n="products_organizers">Organizers</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label" data-i18n="admin_product_description">Description</label>
                                <textarea class="form-control" id="pf-description" rows="3"></textarea>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label" data-i18n="admin_price">Price (ETB) *</label>
                                <input type="number" class="form-control" id="pf-price" step="0.01" min="0" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label" data-i18n="product_original_price">Original Price (ETB)</label>
                                <input type="number" class="form-control" id="pf-original-price" step="0.01" min="0">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label" data-i18n="admin_stock">Stock *</label>
                                <input type="number" class="form-control" id="pf-stock" min="0" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label" data-i18n="product_brand">Brand</label>
                                <input type="text" class="form-control" id="pf-brand">
                            </div>
                            <div class="col-12">
                                <label class="form-label" data-i18n="admin_image">Image URL</label>
                                <input type="url" class="form-control" id="pf-image" placeholder="https://...">
                            </div>
                            <div class="col-12">
                                <label class="form-label" data-i18n="dashboard_profile_image">Or Upload Image From Device</label>
                                <input type="file" class="form-control" id="pf-image-file" accept="image/*" onchange="adminPage.handleImageFileChange(event)">
                                <div class="form-text" data-i18n="dashboard_choose_image">JPG, PNG, WEBP up to 2MB.</div>
                                <div class="mt-2 d-none" id="pf-image-preview-wrap">
                                    <img id="pf-image-preview" src="" alt="Selected product image preview" style="width: 90px; height: 90px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd;">
                                    <button type="button" class="btn btn-sm btn-outline-secondary ms-2" onclick="adminPage.clearSelectedImage()" data-i18n="action_clear">
                                        Remove selected file
                                    </button>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label" data-i18n="product_rating">Rating</label>
                                <input type="number" class="form-control" id="pf-rating" min="0" max="5" step="0.1" value="4.0">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label" data-i18n="product_reviews">Reviews Count</label>
                                <input type="number" class="form-control" id="pf-reviews" min="0" value="0">
                            </div>
                            <div class="col-md-3">
                                <div class="form-check mt-4">
                                    <input class="form-check-input" type="checkbox" id="pf-featured">
                                    <label class="form-check-label" for="pf-featured" data-i18n="admin_featured">Featured</label>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="form-check mt-4">
                                    <input class="form-check-input" type="checkbox" id="pf-trending">
                                    <label class="form-check-label" for="pf-trending" data-i18n="products_trending">Trending</label>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" data-i18n="admin_cancel">Cancel</button>
                    <button type="button" class="btn btn-primary" id="save-product-btn" onclick="adminPage.saveProduct()">
                        <i class="bi bi-check-circle me-1"></i><span data-i18n="admin_save_product_btn">Save Product</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/app.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
