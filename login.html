<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - InkSpire</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100" style="background:linear-gradient(135deg,var(--primary-50),#FEF3C7);">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-pen-fill"></i>InkSpire</a>
            <a href="index.html" class="btn btn-outline-primary btn-sm">
                <i class="bi bi-house me-1"></i>Home
            </a>
        </div>
    </nav>

    <main class="flex-grow-1 d-flex align-items-center py-5">
        <div class="container">
            <div class="auth-container">
                <div class="auth-card">
                    <div class="auth-header">
                        <div class="auth-icon">
                            <i class="bi bi-box-arrow-in-right"></i>
                        </div>
                        <h2 class="auth-title">Welcome Back!</h2>
                        <p class="auth-subtitle">Sign in to your account to continue</p>
                    </div>

                    <form id="login-form" novalidate>
                        <div class="mb-3">
                            <label for="login-email" class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white"><i class="bi bi-envelope text-muted"></i></span>
                                <input type="email" class="form-control" id="login-email" 
                                       placeholder="your@email.com" required>
                            </div>
                            <div class="invalid-feedback" id="email-error"></div>
                        </div>

                        <div class="mb-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <label for="login-password" class="form-label">Password</label>
                                <a href="#" class="small text-decoration-none" id="forgot-password-link">Forgot Password?</a>
                            </div>
                            <div class="input-group">
                                <span class="input-group-text bg-white"><i class="bi bi-lock text-muted"></i></span>
                                <input type="password" class="form-control" id="login-password" 
                                       placeholder="Enter your password" required minlength="6">
                                <span class="input-group-text password-toggle" id="toggle-password">
                                    <i class="bi bi-eye"></i>
                                </span>
                            </div>
                            <div class="invalid-feedback" id="password-error"></div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember-me">
                                <label class="form-check-label small" for="remember-me">Remember me</label>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 btn-lg" id="login-btn">
                            <i class="bi bi-box-arrow-in-right"></i>
                            <span>Sign In</span>
                        </button>
                    </form>

                    <div class="auth-divider">or</div>

                    <p class="text-center mb-0">
                        Don't have an account? 
                        <a href="register.html" class="fw-bold">Create one</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <!-- Forgot Password Modal -->
    <div class="modal fade" id="forgotPasswordModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-key me-2"></i>Reset Password</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted small mb-3">Enter your email address and we'll send you a password reset link.</p>
                    <div class="mb-3">
                        <label for="reset-email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="reset-email" placeholder="your@email.com">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="send-reset-btn">
                        <i class="bi bi-send me-1"></i>Send Reset Link
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/app.js"></script>
    <script>
        // ============================================================
        // LOGIN PAGE CONTROLLER
        // ============================================================
        class LoginPage {
            constructor() {
                this.init();
            }

            async init() {
                await authService.onAuthReady();
                // Redirect if already logged in
                if (authService.isLoggedIn()) {
                    const params = new URLSearchParams(window.location.search);
                    window.location.href = params.get('redirect') || 'index.html';
                    return;
                }
                this.bindEvents();
            }

            bindEvents() {
                // Login form
                document.getElementById('login-form').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    await this.handleLogin();
                });

                // Password toggle
                document.getElementById('toggle-password').addEventListener('click', () => {
                    const input = document.getElementById('login-password');
                    const icon = document.querySelector('#toggle-password i');
                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.className = 'bi bi-eye-slash';
                    } else {
                        input.type = 'password';
                        icon.className = 'bi bi-eye';
                    }
                });

                // Forgot password
                document.getElementById('forgot-password-link').addEventListener('click', (e) => {
                    e.preventDefault();
                    const email = document.getElementById('login-email').value;
                    document.getElementById('reset-email').value = email;
                    new bootstrap.Modal(document.getElementById('forgotPasswordModal')).show();
                });

                // Send reset
                document.getElementById('send-reset-btn').addEventListener('click', async () => {
                    const email = document.getElementById('reset-email').value.trim();
                    if (!email) {
                        toast.warning('Please enter your email address.');
                        return;
                    }
                    const btn = document.getElementById('send-reset-btn');
                    btn.disabled = true;
                    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Sending...';
                    await authService.resetPassword(email);
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-send me-1"></i>Send Reset Link';
                    bootstrap.Modal.getInstance(document.getElementById('forgotPasswordModal')).hide();
                });
            }

            async handleLogin() {
                const email = document.getElementById('login-email').value.trim();
                const password = document.getElementById('login-password').value;
                const rememberMe = document.getElementById('remember-me').checked;

                // Validation
                if (!email) {
                    toast.warning('Please enter your email address.');
                    return;
                }
                if (!password || password.length < 6) {
                    toast.warning('Password must be at least 6 characters.');
                    return;
                }

                const btn = document.getElementById('login-btn');
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Signing in...';

                const result = await authService.login(email, password, rememberMe);

                if (result.success) {
                    const params = new URLSearchParams(window.location.search);
                    const redirect = params.get('redirect') || 'index.html';
                    setTimeout(() => {
                        window.location.href = redirect;
                    }, 500);
                } else {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i><span>Sign In</span>';
                }
            }
        }

        new LoginPage();
    </script>
</body>
</html>
